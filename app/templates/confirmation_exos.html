{% extends "base_exo.html" %}

{% block title %}Utilisateur ajouté{% endblock %}

{% block content %}

<div class="container mt-5" style="max-width: 500px;">

    <div class="card shadow-lg border-0 rounded-4 p-4">

        <div class="text-center">
            <h2 class="fw-bold text-success mb-3">🎉 Utilisateur ajouté avec succès !</h2>
        </div>

        <div class="mt-3">
            <p><strong>Nom :</strong> {{ nom }}</p>
            <p><strong>Email :</strong> {{ email }}</p>
            <p><strong>Âge :</strong> {{ age }} ans</p>
        </div>

        <div class="d-flex justify-content-between mt-4">
            <a href="{{ url_for('formulaire') }}" class="btn btn-outline-primary">
                ➕ Ajouter un autre
            </a>

            <a href="{{ url_for('dashboard') }}" class="btn btn-success">
                📊 Retour au dashboard
            </a>
        </div>

    </div>

</div>

{% endblock %}
